# =============================================================================
# STAGING override — no source mounts, no debug, exposed on standard ports
# =============================================================================
# Usage (via deploy.ps1):
#   .\deploy.ps1 -Env staging
# Or manually:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging up -d
# =============================================================================
version: '3.8'

services:

  db:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  fermentation:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    # No host port — nginx-gateway is the sole public endpoint

  winery:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    # No host port — nginx-gateway is the sole public endpoint

  fruit_origin:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    # No host port — nginx-gateway is the sole public endpoint

  analysis_engine:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    # No host port — nginx-gateway is the sole public endpoint

  # ---------------------------------------------------------------------------
  # nginx API Gateway — single public entry point for all four services.
  # Frontend only needs to know one port; nginx routes by path prefix.
  # ---------------------------------------------------------------------------
  nginx-gateway:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fermentation:
        condition: service_healthy
      winery:
        condition: service_healthy
      fruit_origin:
        condition: service_healthy
      analysis_engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

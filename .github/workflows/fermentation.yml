name: Fermentation Module CI

on:
  push:
    paths:
      - 'src/modules/fermentation/**'
      - '.github/workflows/fermentation.yml'
  pull_request:
    paths:
      - 'src/modules/fermentation/**'
      - '.github/workflows/fermentation.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/modules/fermentation

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Poetry
      run: pip install poetry
      
    - name: Install dependencies
      run: poetry install
        
    - name: Run tests
      run: poetry run pytest
      
    - name: Run linting
      run: |
        poetry run black . --check
        poetry run flake8 .
        poetry run mypy src

    - name: Check for short (non-absolute) imports
      run: |
        echo "Checking for short package imports that should use absolute paths..."
        if grep -rn --include="*.py" -E "^from (shared|domain|wine_fermentator_logging|api)\\."
            src/ tests/; then
          echo ""
          echo "ERROR: Short imports found. Replace with absolute paths:"
          echo "  from shared.*          -> from src.shared.*"
          echo "  from domain.*          -> from src.modules.fermentation.src.domain.*"
          echo "  from wine_fermentator_logging  -> from src.shared.wine_fermentator_logging"
          exit 1
        fi
        echo "Import lint check passed."

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build and push Docker image
      run: docker build -t wine-fermentation-module ./src/modules/fermentation

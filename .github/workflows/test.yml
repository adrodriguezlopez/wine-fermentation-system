name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-fruit-origin:
    name: Fruit Origin Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Poetry
      run: pip install poetry

    - name: Install shared package
      run: |
        cd src/shared
        poetry install

    - name: Install fruit_origin dependencies
      run: |
        cd src/modules/fruit_origin
        poetry install

    - name: Run unit tests
      run: |
        cd src/modules/fruit_origin
        poetry run pytest tests/unit/ -v --tb=short

    - name: Run integration tests
      run: |
        cd src/modules/fruit_origin
        poetry run pytest tests/integration/ -v --tb=short

  test-fermentation:
    name: Fermentation Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Poetry
      run: pip install poetry

    - name: Install shared package
      run: |
        cd src/shared
        poetry install

    - name: Install fermentation dependencies
      run: |
        cd src/modules/fermentation
        poetry install

    - name: Run unit tests
      run: |
        cd src/modules/fermentation
        poetry run pytest tests/unit/ -v --tb=short

    - name: Run integration tests individually
      run: |
        cd src/modules/fermentation
        # Run each integration test file separately to avoid fixture conflicts
        for test_file in tests/integration/**/test_*.py; do
          echo "Running $test_file..."
          poetry run pytest "$test_file" -v --tb=short || exit 1
        done

  lint-imports:
    name: Import Lint Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check for short (non-absolute) imports
      run: |
        echo "Checking for short package imports that should use absolute paths..."
        if grep -rn --include="*.py" -E "^from (shared|domain|wine_fermentator_logging|api)\\."
            src/ tests/; then
          echo ""
          echo "ERROR: Short imports found. Replace with absolute paths:"
          echo "  from shared.*          -> from src.shared.*"
          echo "  from domain.*          -> from src.modules.<module>.src.domain.*"
          echo "  from wine_fermentator_logging  -> from src.shared.wine_fermentator_logging"
          echo "  from api.*             -> from src.<module>.api.*"
          exit 1
        fi
        echo "Import lint check passed."

  test-summary:
    name: Test Summary
    needs: [test-fruit-origin, test-fermentation, lint-imports]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Check test results
      run: |
        if [ "${{ needs.test-fruit-origin.result }}" != "success" ] || [ "${{ needs.test-fermentation.result }}" != "success" ]; then
          echo "Some tests failed"
          exit 1
        fi
        echo "All tests passed!"

# =============================================================================
# STAGING override — no source mounts, no debug, exposed on standard ports
# =============================================================================
# Usage (via deploy.ps1):
#   .\deploy.ps1 -Env staging
# Or manually:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging up -d
# =============================================================================
version: '3.8'

services:

  db:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  fermentation:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    ports:
      - "${FERMENTATION_HOST_PORT:-8000}:8000"

  winery:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    ports:
      - "${WINERY_HOST_PORT:-8001}:8001"

  fruit_origin:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    ports:
      - "${FRUIT_ORIGIN_HOST_PORT:-8002}:8002"

  analysis_engine:
    environment:
      ALLOWED_ORIGINS: "https://staging.app.midominio.com"
    ports:
      - "${ANALYSIS_ENGINE_HOST_PORT:-8003}:8003"

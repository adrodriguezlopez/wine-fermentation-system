# =============================================================================
# PROD override — no ports exposed to host (use a reverse proxy/load balancer
# to terminate TLS and forward to internal container addresses)
# =============================================================================
# Usage (via deploy.ps1):
#   .\deploy.ps1 -Env prod
# Or manually:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================
version: '3.8'

services:

  # Database is NOT exposed to the host in production.
  # Connect via internal Docker network only.
  db:
    restart: always

  fermentation:
    restart: always
    environment:
      ALLOWED_ORIGINS: "https://app.midominio.com"
    # No host port — reached via reverse proxy on the internal network
    # ports: []  ← intentionally omitted

  winery:
    restart: always
    environment:
      ALLOWED_ORIGINS: "https://app.midominio.com"
    # No host port — reached via reverse proxy on the internal network
    # ports: []  ← intentionally omitted

  fruit_origin:
    restart: always
    environment:
      ALLOWED_ORIGINS: "https://app.midominio.com"
    # No host port — reached via reverse proxy on the internal network
    # ports: []  ← intentionally omitted

  analysis_engine:
    restart: always
    environment:
      ALLOWED_ORIGINS: "https://app.midominio.com"
    # No host port — reached via nginx-gateway

  # ---------------------------------------------------------------------------
  # nginx API Gateway — single public entry point for all four services.
  # TLS termination is handled upstream (load balancer / CDN).
  # ---------------------------------------------------------------------------
  nginx-gateway:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      fermentation:
        condition: service_healthy
      winery:
        condition: service_healthy
      fruit_origin:
        condition: service_healthy
      analysis_engine:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

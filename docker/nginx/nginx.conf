# =============================================================================
# Wine Fermentation System — nginx API Gateway
# =============================================================================
# Upstream routing table (Docker service names resolve via internal DNS):
#
#   /api/v1/auth/*                         → winery:8001
#   /api/v1/wineries/*                     → winery:8001
#   /api/v1/vineyards/*                    → fruit_origin:8002
#   /api/v1/harvest-lots/*                 → fruit_origin:8002
#   /api/v1/analyses/*                     → analysis_engine:8003
#   /api/v1/recommendations/*              → analysis_engine:8003
#   /api/v1/advisories/*                   → analysis_engine:8003
#   /api/v1/fermentations/*/advisories     → analysis_engine:8003  (regex, sub-resource)
#   /api/v1/fermentations/*                → fermentation:8000
#   /api/v1/fermentation/historical/*      → fermentation:8000
#   /api/v1/protocols/*                    → fermentation:8000
#   /api/v1/executions/*                   → fermentation:8000
#   /api/v1/samples/*                      → fermentation:8000
#   GET /health                            → nginx (static 200, no upstream)
# =============================================================================

upstream fermentation    { server fermentation:8000;   }
upstream winery          { server winery:8001;          }
upstream fruit_origin    { server fruit_origin:8002;    }
upstream analysis_engine { server analysis_engine:8003; }

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Shared proxy headers forwarded to all upstream services
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # WebSocket upgrade headers (no-op for plain HTTP requests)
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # -------------------------------------------------------------------------
    # Gateway health check — nginx responds directly, no upstream required
    # -------------------------------------------------------------------------
    location = /health {
        add_header Content-Type application/json always;
        return 200 '{"status":"healthy","service":"nginx-gateway"}';
    }

    # -------------------------------------------------------------------------
    # Analysis Engine — advisory sub-resource
    #
    # IMPORTANT: this regex location MUST appear before the
    # /api/v1/fermentations/ prefix block below.  nginx evaluates all regex
    # (~) locations in order of appearance BEFORE general prefix blocks, so
    # /api/v1/fermentations/{id}/advisories is correctly routed to
    # analysis_engine even though it starts with /api/v1/fermentations/.
    # -------------------------------------------------------------------------
    location ~ ^/api/v1/fermentations/[^/]+/advisories(/|$) {
        proxy_pass http://analysis_engine;
    }

    # -------------------------------------------------------------------------
    # Analysis Engine
    # -------------------------------------------------------------------------
    location /api/v1/analyses/        { proxy_pass http://analysis_engine; }
    location /api/v1/recommendations/ { proxy_pass http://analysis_engine; }
    location /api/v1/advisories/      { proxy_pass http://analysis_engine; }

    # -------------------------------------------------------------------------
    # Winery
    # Also handles /api/v1/auth/ — all four modules expose the shared auth
    # router, but winery is authoritative as the multi-tenancy root.
    # -------------------------------------------------------------------------
    location /api/v1/wineries/ { proxy_pass http://winery; }
    location /api/v1/auth/     { proxy_pass http://winery; }

    # -------------------------------------------------------------------------
    # Fruit Origin
    # -------------------------------------------------------------------------
    location /api/v1/vineyards/    { proxy_pass http://fruit_origin; }
    location /api/v1/harvest-lots/ { proxy_pass http://fruit_origin; }

    # -------------------------------------------------------------------------
    # Fermentation
    # Covers fermentations, fermentation/historical, protocols, executions
    # (alert sub-resources), samples, and all winemaker-action sub-paths.
    # -------------------------------------------------------------------------
    location /api/v1/fermentations/ { proxy_pass http://fermentation; }
    location /api/v1/fermentation/  { proxy_pass http://fermentation; }
    location /api/v1/protocols/     { proxy_pass http://fermentation; }
    location /api/v1/executions/    { proxy_pass http://fermentation; }
    location /api/v1/samples/       { proxy_pass http://fermentation; }
}
